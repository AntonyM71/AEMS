events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 82;
        server_name _;

        root /usr/share/nginx/html/pack;

        # Liveness endpoint for compose health checks.
        location = /healthz {
            default_type text/plain;
            return 200 "ok\n";
        }

        # /componentInfo/{name} -> /components/{name}.json
        location ~ ^/componentInfo/([A-Za-z0-9_-]+)$ {
            default_type application/json;
            try_files /components/$1.json =404;
            add_header Cache-Control "public, max-age=60";
        }

        # JSON manifests are short-lived to make pack edits visible quickly.
        location /components/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=60";
        }

        # Static image assets are immutable and aggressively cached.
        location /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location / {
            try_files $uri =404;
        }
    }
}
